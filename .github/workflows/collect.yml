name: Collect

on:
  schedule:
    - cron: '*/10 * * * *'   # every 10 minutes; collect.R exits if outside window
  workflow_dispatch:           # allow manual trigger from Actions tab

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ${{ env.R_LIBS_USER }}
          key: r-pkgs-v1-${{ hashFiles('collect.R') }}
          restore-keys: r-pkgs-v1-

      - name: Install packages
        run: |
          Rscript -e 'install.packages(
            c("tidytransit", "httr2", "jsonlite", "dplyr", "readr", "lubridate"),
            repos = "https://cloud.r-project.org"
          )'

      - name: Collect
        run: Rscript collect.R

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "collect $(date -u +%FT%TZ)"
          git push
