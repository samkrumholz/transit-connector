name: Collect

on:
  schedule:
    - cron: '*/10 10-13 * * 1-5'   # Mon-Fri 10:00-13:50 UTC (AM window)
    - cron: '*/10 19-23 * * 1-5'   # Mon-Fri 19:00-23:50 UTC (PM window)
  workflow_dispatch:

jobs:
  collect:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - name: Cache R packages
        uses: actions/cache@v4
        with:
          path: ~/.local/share/pak
          key: r-pak-${{ runner.os }}-v3
          restore-keys: r-pak-${{ runner.os }}-

      - name: Install R packages
        run: |
          Rscript -e '
            if (!requireNamespace("pak", quietly = TRUE))
              install.packages("pak", repos = "https://r-lib.github.io/p/pak/stable/")
            pak::pkg_install(c("httr2", "jsonlite", "dplyr", "readr", "lubridate"))
          '

      - name: Install Python GTFS-RT parser
        run: pip install gtfs-realtime-bindings

      - name: Collect
        env:
          TOMTOM_API_KEY: ${{ secrets.TOMTOM_API_KEY }}
        run: Rscript collect.R

      - name: Commit data
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "collect $(date -u +%FT%TZ)"
          git push
